services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - log-data:/data/logs
      - metrics-data:/data/metrics
    environment:
      NODE_ENV: production
      TZ: UTC
      PORT: 3000
      BIND_HOST: 0.0.0.0
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}

      LOG_DIR: /data/logs
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      MAX_LOG_SIZE_MB: ${MAX_LOG_SIZE_MB:-50}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      UPSTREAM_URL: ${UPSTREAM_URL:-}
      PROXY_PATH_PREFIX: ${PROXY_PATH_PREFIX:-/proxy}
      PROXY_TRUST_FORWARDED: ${PROXY_TRUST_FORWARDED:-false}
      PROXY_PROVIDER: ${PROXY_PROVIDER:-generic}
      PROXY_TOKEN_TRACKING: ${PROXY_TOKEN_TRACKING:-true}
      PROXY_TOKEN_TEE_MAX_BYTES: ${PROXY_TOKEN_TEE_MAX_BYTES:-2097152}
      PROXY_REQUEST_IDLE_TIMEOUT_MS: ${PROXY_REQUEST_IDLE_TIMEOUT_MS:-120000}
      PROXY_INSECURE_TLS: ${PROXY_INSECURE_TLS:-false}
      PRICING_CONFIG_PATH: ${PRICING_CONFIG_PATH:-}

      MAX_METRIC_EVENTS: ${MAX_METRIC_EVENTS:-10000}
      METRICS_TICK_MS: ${METRICS_TICK_MS:-1000}

      MAX_SSE_CLIENTS: ${MAX_SSE_CLIENTS:-50}
      SSE_EVENT_RATE: ${SSE_EVENT_RATE:-50}

      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-30000}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-30000}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 0 * * *}
      ENABLE_COMPRESSION: ${ENABLE_COMPRESSION:-false}

      # Compactor (v0.3.0 — opt-in prompt compression). Default off.
      # See docs/COMPACTOR.md and CONFIGURATION.md for the full reference.
      COMPACTOR_ENABLED: ${COMPACTOR_ENABLED:-false}
      COMPACTOR_REQUEST_BODY: ${COMPACTOR_REQUEST_BODY:-true}
      COMPACTOR_RESPONSE_BODY: ${COMPACTOR_RESPONSE_BODY:-false}
      COMPACTOR_TOOL_RESULT_ONLY: ${COMPACTOR_TOOL_RESULT_ONLY:-true}
      COMPACTOR_ALLOW_RISKY: ${COMPACTOR_ALLOW_RISKY:-false}
      COMPACTOR_MAX_REQ_BYTES: ${COMPACTOR_MAX_REQ_BYTES:-4194304}
      COMPACTOR_LONG_FILE_THRESHOLD: ${COMPACTOR_LONG_FILE_THRESHOLD:-400}
      COMPACTOR_ANSI_STRIP_ENABLED: ${COMPACTOR_ANSI_STRIP_ENABLED:-true}
      COMPACTOR_BLANKLINE_COLLAPSE_ENABLED: ${COMPACTOR_BLANKLINE_COLLAPSE_ENABLED:-true}
      COMPACTOR_DIFF_COLLAPSE_ENABLED: ${COMPACTOR_DIFF_COLLAPSE_ENABLED:-true}
      COMPACTOR_LOCKFILE_DROP_ENABLED: ${COMPACTOR_LOCKFILE_DROP_ENABLED:-true}
      COMPACTOR_LS_LONG_SHRINK_ENABLED: ${COMPACTOR_LS_LONG_SHRINK_ENABLED:-true}
      COMPACTOR_NPM_NOISE_STRIP_ENABLED: ${COMPACTOR_NPM_NOISE_STRIP_ENABLED:-true}
      COMPACTOR_REPEAT_LINE_DEDUPE_ENABLED: ${COMPACTOR_REPEAT_LINE_DEDUPE_ENABLED:-true}
      COMPACTOR_STACKTRACE_DEDUPE_ENABLED: ${COMPACTOR_STACKTRACE_DEDUPE_ENABLED:-true}
      COMPACTOR_LONG_FILE_ELIDE_ENABLED: ${COMPACTOR_LONG_FILE_ELIDE_ENABLED:-true}
      COMPACTOR_BASE64_TRUNCATE_ENABLED: ${COMPACTOR_BASE64_TRUNCATE_ENABLED:-true}
      # Guardrails (v0.4.0) — opt-in prompt safety. See docs/GUARDRAILS.md.
      GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-false}
      GUARDRAILS_MAX_REQ_BYTES: ${GUARDRAILS_MAX_REQ_BYTES:-4194304}
      GUARDRAILS_SECRETS_MODE: ${GUARDRAILS_SECRETS_MODE:-off}
      GUARDRAILS_PII_MODE: ${GUARDRAILS_PII_MODE:-off}
      GUARDRAILS_INJECTION_MODE: ${GUARDRAILS_INJECTION_MODE:-off}
      GUARDRAILS_CUSTOM_PATTERNS_FILE: ${GUARDRAILS_CUSTOM_PATTERNS_FILE:-}
      # Multi-upstream routing (v0.4.0) — opt-in. See docs/ROUTING.md.
      ROUTES_CONFIG_PATH: ${ROUTES_CONFIG_PATH:-}
      PROXY_ROUTES: ${PROXY_ROUTES:-}
      # Metric persistence (v0.4.0) — opt-in SQLite. See CONFIGURATION.md.
      METRICS_DB_PATH: ${METRICS_DB_PATH:-/data/metrics/metrics.db}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-30}
      METRICS_WRITE_BATCH_SIZE: ${METRICS_WRITE_BATCH_SIZE:-100}
      METRICS_WRITE_BATCH_MS: ${METRICS_WRITE_BATCH_MS:-1000}
      # Cache (v0.6.0) — opt-in Dragonfly response cache.
      # Enable Dragonfly via: docker compose --profile cache up
      CACHE_ENABLED: ${CACHE_ENABLED:-false}
      CACHE_REDIS_URL: ${CACHE_REDIS_URL:-redis://dragonfly:6379}
      CACHE_EXACT_MATCH_ENABLED: ${CACHE_EXACT_MATCH_ENABLED:-true}
      CACHE_EXACT_TTL_SECONDS: ${CACHE_EXACT_TTL_SECONDS:-3600}
      CACHE_DEDUP_ENABLED: ${CACHE_DEDUP_ENABLED:-true}
      CACHE_SPEND_ENABLED: ${CACHE_SPEND_ENABLED:-false}
      CACHE_SPEND_DAILY_LIMIT_USD: ${CACHE_SPEND_DAILY_LIMIT_USD:-}
      CACHE_SPEND_MONTHLY_LIMIT_USD: ${CACHE_SPEND_MONTHLY_LIMIT_USD:-}
      CACHE_SSE_FANOUT_ENABLED: ${CACHE_SSE_FANOUT_ENABLED:-false}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.26.2
    profiles: ["cache"]
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly-data:/data
    ulimits:
      memlock: -1
    restart: unless-stopped

volumes:
  log-data:
    driver: local
  metrics-data:
    driver: local
  dragonfly-data:
    driver: local
