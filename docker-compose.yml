services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - log-data:/data/logs
    environment:
      NODE_ENV: production
      TZ: UTC
      PORT: 3000
      BIND_HOST: 0.0.0.0
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}

      LOG_DIR: /data/logs
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      MAX_LOG_SIZE_MB: ${MAX_LOG_SIZE_MB:-50}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      UPSTREAM_URL: ${UPSTREAM_URL:-}
      PROXY_PATH_PREFIX: ${PROXY_PATH_PREFIX:-/proxy}
      PROXY_TRUST_FORWARDED: ${PROXY_TRUST_FORWARDED:-false}
      PROXY_PROVIDER: ${PROXY_PROVIDER:-generic}
      PROXY_TOKEN_TRACKING: ${PROXY_TOKEN_TRACKING:-true}
      PROXY_TOKEN_TEE_MAX_BYTES: ${PROXY_TOKEN_TEE_MAX_BYTES:-2097152}
      PROXY_REQUEST_IDLE_TIMEOUT_MS: ${PROXY_REQUEST_IDLE_TIMEOUT_MS:-120000}
      PROXY_INSECURE_TLS: ${PROXY_INSECURE_TLS:-false}
      PRICING_CONFIG_PATH: ${PRICING_CONFIG_PATH:-}

      MAX_METRIC_EVENTS: ${MAX_METRIC_EVENTS:-10000}
      METRICS_TICK_MS: ${METRICS_TICK_MS:-1000}

      MAX_SSE_CLIENTS: ${MAX_SSE_CLIENTS:-50}
      SSE_EVENT_RATE: ${SSE_EVENT_RATE:-50}

      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-30000}
      SSE_HEARTBEAT_MS: ${SSE_HEARTBEAT_MS:-30000}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 0 * * *}
      ENABLE_COMPRESSION: ${ENABLE_COMPRESSION:-false}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

volumes:
  log-data:
    driver: local
