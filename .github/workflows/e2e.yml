name: E2E

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Re-bless visual baselines on the runner and upload them as an artifact'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (functional + visual)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run vitest (sanity)
        run: npm test

      - name: Functional E2E
        run: npm run test:e2e

      - name: Visual regression
        if: ${{ github.event.inputs.update_snapshots != 'true' }}
        run: npm run test:e2e:visual

      - name: Re-bless visual baselines
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: npm run test:e2e:visual:bless

      - name: Upload re-blessed baselines
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: tests/e2e/visual/**/*-snapshots/**
          retention-days: 7

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
